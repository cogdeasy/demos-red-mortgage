<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" fill="none">
  <!--
    HSBC Logo: The iconic flag/chevron mark.
    It's a rectangle divided by diagonal lines into 6 triangular sections.
    The top-center and bottom-center triangles are red.
    The top-left and bottom-right triangles are red.
    The top-right and bottom-left triangles are white (negative space).
    This creates the appearance of two red chevrons/arrows pointing inward.
  -->
  <!-- HSBC flag mark scaled from official SVG (4 red triangles) -->
  <g transform="scale(0.518)">
    <polygon points="170.1,42.6 127.6,0 127.6,85.1" fill="#db0011"/>
    <polygon points="85.1,42.6 127.6,0 42.6,0" fill="#db0011"/>
    <polygon points="0,42.6 42.6,85.1 42.6,0" fill="#db0011"/>
    <polygon points="85.1,42.6 42.6,85.1 127.6,85.1" fill="#db0011"/>
  </g>
  <!-- HSBC Text -->
  <text x="100" y="33" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#000000" letter-spacing="2">HSBC</text>
</svg>
