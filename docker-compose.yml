version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mortgage
      POSTGRES_USER: mortgage
      POSTGRES_PASSWORD: mortgage_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mortgage']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/mortgage
      DB_USERNAME: mortgage
      DB_PASSWORD: mortgage_dev
      PORT: '3001'
      SPRING_PROFILES_ACTIVE: seed
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001
      API_URL: http://backend:3001
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  pgdata:
